<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分數加法與實物挑戰 - 挑戰版</title>
    <style>
        :root {
            --primary: #4CAF50;
            --accent: #2196F3;
            --bg: #f5f7fa;
            --bar-bg: #e0e0e0;
            --color-a: #ff7675;
            --color-b: #74b9ff;
            --next-btn: #ff9800;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 650px;
            text-align: center;
            position: relative;
        }

        .progress-text {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .object-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #fff9c4;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 2.5rem;
            min-height: 100px;
        }

        .visual-container {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .math-container {
            margin: 25px 0;
        }

        .sub-question {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .math-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 2.2rem;
            font-weight: bold;
            flex-wrap: wrap;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 2px;
        }

        .num-box {
            border-bottom: 4px solid #333;
            padding: 0 5px;
            min-width: 60px;
        }

        .den {
            padding: 4px 8px;
            font-size: 2.2rem;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #2c3e50;
            line-height: 1.5;
        }

        input[type="number"] {
            width: 60px;
            font-size: 1.8rem;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 2px;
            outline: none;
            background-color: #f1f8e9;
        }

        input[id="ans-num"] {
            background-color: #e3f2fd;
            border-width: 3px;
            width: 70px;
            font-size: 2.2rem;
        }

        input:focus { border-color: var(--accent); background-color: #fff; }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { transform: scale(1.05); opacity: 0.9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #next-btn {
            background-color: var(--next-btn);
            display: none;
        }

        #msg {
            margin-top: 15px;
            font-size: 1.2rem;
            min-height: 1.5em;
            color: #555;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-line;
            line-height: 1.4;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            40% { color: #888; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .5em 0 0 #888, 1em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .5em 0 0 #888, 1em 0 0 #888; }
        }

        .highlight { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-box">
    <h1>🍎 分數列式挑戰</h1>
    <div id="progress" class="progress-text">載入中...</div>

    <div id="question-info" class="question-text"></div>

    <div id="visual-area" class="visual-container"></div>

    <div id="math-display-container" class="math-container">
        <div id="sub-question-text" class="sub-question"></div>
        <div id="math-display" class="math-row"></div>
    </div>

    <div class="btn-group">
        <button id="submit-btn" onclick="submit()">提交答案</button>
        <button id="next-btn" onclick="next()">下一題 ➔</button>
    </div>
    
    <div id="msg"></div>
</div>

<script>
    const apiKey = "";
    let step = 1;
    let score = 0;
    let q = {};
    const total = 10;

    const categories = [
        { name: "水果", items: [{n: "橙", e: "🍊"}, {n: "香蕉", e: "🍌"}, {n: "蘋果", e: "🍎"}] },
        { name: "餅乾", items: [{n: "曲奇餅", e: "🍪"}, {n: "甜甜圈", e: "🍩"}, {n: "巧克力", e: "🍫"}] },
        { name: "球類", items: [{n: "足球", e: "⚽"}, {n: "籃球", e: "🏀"}, {n: "網球", e: "🎾"}] },
        { name: "文具", items: [{n: "鉛筆", e: "✏️"}, {n: "書本", e: "📖"}, {n: "尺子", e: "📏"}] }
    ];

    async function fetchAiFeedback(isCorrect, results) {
        const systemPrompt = "你是一個專業的數學老師。根據學生是否答對提供一句鼓勵性回饋。如果答錯，指出是列式數據錯誤還是最後計算錯誤。";
        const userQuery = isCorrect 
            ? `學生答對了！列式與計算都正確。請讚揚他的邏輯與細心。` 
            : `學生答錯了。判定狀況：列式 ${results.listStatus}, 計算結果 ${results.totalStatus}。請溫柔給予指導，若加數填錯，請提醒觀察題目數量。`;

        let delay = 1000;
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch("https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "qwen-plus",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userQuery }
                        ]
                    })
                });
                const result = await response.json();
                return result.choices?.[0]?.message?.content || (isCorrect ? "非常好！列式與計算都正確！" : "再檢查一下題目中的數量喔！");
            } catch (error) {
                if (i === 4) return isCorrect ? "非常正確！" : "檢查一下列式有沒有對應到題目物品喔。";
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
        }
    }

    function next() {
        if (step > total) {
            finish();
            return;
        }

        document.getElementById('progress').innerText = `題目：${step} / ${total}`;
        document.getElementById('msg').innerText = '';
        document.getElementById('msg').style.backgroundColor = 'transparent';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('next-btn').style.display = 'none';

        const type = 2; 
        let den = Math.floor(Math.random() * 6) + 5; 
        let n1 = Math.floor(Math.random() * (den - 3)) + 1;
        let n2 = Math.floor(Math.random() * (den - n1 - 1)) + 1;
        let n3 = den - n1 - n2; 

        q = { type, den, n1, n2, n3 };

        const visualArea = document.getElementById('visual-area');
        const infoArea = document.getElementById('question-info');
        const mathArea = document.getElementById('math-display');
        const subQuestArea = document.getElementById('sub-question-text');

        const cat = categories[Math.floor(Math.random() * categories.length)];
        const itemA = cat.items[0];
        const itemB = cat.items[1];
        const itemC = cat.items[2];
        
        // 需要用到的兩個加數分子
        q.required_vals = [n1, n3];
        q.total_correct = n1 + n3; 

        infoArea.innerHTML = `這裡有 <span class="highlight">${den}</span> 個${cat.name}。<br>` + 
                            `其中有 <span class="highlight">${n1}</span> 個${itemA.n}、` +
                            `<span class="highlight">${n2}</span> 個${itemB.n}和 ` +
                            `<span class="highlight">${n3}</span> 個${itemC.n}。`;
        
        visualArea.innerHTML = `<div class="object-display" id="obj-list"></div>`;
        const objList = document.getElementById('obj-list');
        let pool = [];
        for(let i=0; i<n1; i++) pool.push(itemA.e);
        for(let i=0; i<n2; i++) pool.push(itemB.e);
        for(let i=0; i<n3; i++) pool.push(itemC.e);
        pool.sort(() => Math.random() - 0.5);
        pool.forEach(emoji => { objList.innerHTML += `<span>${emoji}</span>`; });

        subQuestArea.innerText = `請列出算式：${itemA.n}和${itemC.n}共佔全部的幾分之幾？`;

        mathArea.innerHTML = `
            <div class="fraction">
                <div class="num-box"><input type="number" id="input-n1" placeholder="?"></div>
                <div class="den">${den}</div>
            </div>
            <span>+</span>
            <div class="fraction">
                <div class="num-box"><input type="number" id="input-n2" placeholder="?"></div>
                <div class="den">${den}</div>
            </div>
            <span>=</span>
            <div class="fraction">
                <div class="num-box"><input type="number" id="ans-num" placeholder="?"></div>
                <div class="den">${den}</div>
            </div>`;
            
        document.getElementById('input-n1').focus();
    }

    async function submit() {
        const in1 = document.getElementById('input-n1');
        const in2 = document.getElementById('input-n2');
        const iTotal = document.getElementById('ans-num');
        
        const v1 = parseInt(in1.value);
        const v2 = parseInt(in2.value);
        const vTotal = parseInt(iTotal.value);

        if (isNaN(v1) || isNaN(v2) || isNaN(vTotal)) return;

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        in1.disabled = in2.disabled = iTotal.disabled = true;

        // 檢查兩個加數是否與要求的數組匹配（不計順序）
        const userAddends = [v1, v2].sort((a, b) => a - b);
        const correctAddends = [...q.required_vals].sort((a, b) => a - b);
        
        const isListCorrect = (JSON.stringify(userAddends) === JSON.stringify(correctAddends));
        const isTotalCorrect = (vTotal === q.total_correct);
        const isFullyCorrect = isListCorrect && isTotalCorrect;

        if (isFullyCorrect) score++;

        const res = {
            listStatus: isListCorrect ? "正確" : "錯誤（加數不符）",
            totalStatus: isTotalCorrect ? "正確" : "錯誤"
        };

        const msg = document.getElementById('msg');
        msg.innerHTML = `<span class="loading-dots">AI 老師閱卷中</span>`;
        msg.style.backgroundColor = '#f0f0f0';

        const aiFeedback = await fetchAiFeedback(isFullyCorrect, res);
        
        msg.innerText = (isFullyCorrect ? "✅ " : "❌ ") + aiFeedback;
        msg.style.backgroundColor = isFullyCorrect ? '#e8f5e9' : '#ffebee';
        msg.style.color = isFullyCorrect ? '#2e7d32' : '#c62828';

        submitBtn.style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
        step++;
    }

    function finish() {
        const box = document.getElementById('game-box');
        box.innerHTML = `
            <h1>挑戰達成！</h1>
            <div style="font-size: 5rem; margin: 20px 0; color: var(--accent);">${score * 10} 分</div>
            <p>你能精確列式並計算，邏輯思維非常出色！</p>
            <button onclick="location.reload()">再戰一次</button>
        `;
    }

    document.addEventListener('keypress', (e) => {
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        if (e.key === 'Enter') {
            if (submitBtn.style.display !== 'none' && !submitBtn.disabled) {
                submit();
            } else if (nextBtn.style.display !== 'none') {
                next();
            }
        }
    });

    window.onload = next;
</script>

</body>
</html>
